<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .hidden { display: none; }
        .error { color: red; }
        .success { color: green; }
        #licenseKey {
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            word-break: break-all;
            font-family: monospace;
        }
        .progress {
            background-color: #e9ecef;
            padding: 10px;
            border-radius: 5px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>License Generator</h1>
    <p>You need to click <strong>5 ads</strong> to get a 1-hour license.</p>

    <button id="startBtn">Get License</button>

    <div id="loading" class="hidden">⏳ Setting up...</div>
    <div id="progress" class="progress hidden"></div>
    <div id="result"></div>

    <script>
        // CHANGE THIS AFTER DEPLOYMENT: Replace with your Railway URL
        const API_BASE = 'https://YOUR-RAILWAY-URL.up.railway.app';
        
        async function getUserId() {
            let uid = localStorage.getItem('user_id');
            if (!uid) {
                uid = 'user_' + Math.random().toString(36).substring(2, 15);
                localStorage.setItem('user_id', uid);
            }
            return uid;
        }

        let pollingInterval = null;

        async function startLicenseProcess() {
            const startBtn = document.getElementById('startBtn');
            const loading = document.getElementById('loading');
            const progressDiv = document.getElementById('progress');
            const resultDiv = document.getElementById('result');

            startBtn.disabled = true;
            loading.classList.remove('hidden');
            resultDiv.innerHTML = '';

            const user_id = await getUserId();

            try {
                const response = await fetch(`${API_BASE}/init-license`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id })
                });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error);
                }

                const sessionToken = data.session_token;
                const ptcUrl = data.ptc_url;

                localStorage.setItem('session_token', sessionToken);

                loading.classList.add('hidden');
                progressDiv.classList.remove('hidden');
                progressDiv.innerHTML = `⏳ Redirecting to Zerads... Please click 5 ads. After each ad, come back to this page.`;

                window.open(ptcUrl, '_blank');

                if (pollingInterval) clearInterval(pollingInterval);
                pollingInterval = setInterval(() => {
                    checkSession(sessionToken);
                }, 5000);

            } catch (err) {
                loading.classList.add('hidden');
                resultDiv.innerHTML = `<div class="error">❌ Error: ${err.message}</div>`;
                startBtn.disabled = false;
            }
        }

        async function checkSession(sessionToken) {
            const progressDiv = document.getElementById('progress');
            const resultDiv = document.getElementById('result');
            const startBtn = document.getElementById('startBtn');

            try {
                const response = await fetch(`${API_BASE}/check-session?session_token=${sessionToken}`);
                const data = await response.json();

                if (data.status === 'completed') {
                    clearInterval(pollingInterval);
                    progressDiv.classList.add('hidden');
                    resultDiv.innerHTML = `
                        <div class="success">
                            <strong>✅ License obtained!</strong><br>
                            Copy this key into your Python script:<br>
                            <div id="licenseKey">${data.license_key}</div>
                            <button onclick="navigator.clipboard.writeText('${data.license_key}')">Copy to Clipboard</button>
                            <p><small>Expires in 1 hour | Locked to your IP.</small></p>
                        </div>
                    `;
                    startBtn.disabled = false;
                    localStorage.removeItem('session_token');
                } else if (data.status === 'pending') {
                    progressDiv.innerHTML = `
                        <div class="progress">
                            ✅ Ads clicked: ${data.clicks_done} / ${data.clicks_needed}<br>
                            Keep clicking ads (new tab). Page auto-refreshes.
                        </div>
                    `;
                } else {
                    throw new Error('Unknown status');
                }
            } catch (err) {
                console.error(err);
                progressDiv.innerHTML = `<div class="error">Error checking status: ${err.message}</div>`;
            }
        }

        document.getElementById('startBtn').addEventListener('click', startLicenseProcess);

        window.addEventListener('load', () => {
            const token = localStorage.getItem('session_token');
            if (token) {
                document.getElementById('startBtn').disabled = true;
                document.getElementById('progress').classList.remove('hidden');
                document.getElementById('progress').innerHTML = `Resuming previous session...`;
                pollingInterval = setInterval(() => checkSession(token), 5000);
            }
        });
    </script>
</body>
</html>
